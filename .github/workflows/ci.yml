name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  pre-commit:
    name: Pre-commit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run pre-commit
        uses: pre-commit/action@v3.0.1
        with:
          extra_args: --config pre-commit-config.yaml

  docs:
    name: Documentation
    needs: pre-commit
    uses: ./.github/workflows/docs.yml
    permissions:
      contents: read

  flutter:
    name: Flutter
    needs: pre-commit
    uses: ./.github/workflows/flutter.yml
    permissions:
      contents: read

  django:
    name: Django
    needs: pre-commit
    uses: ./.github/workflows/django.yml
    permissions:
      contents: read

  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs:
      - pre-commit
      - docs
      - flutter
      - django
    if: always()
    steps:
      - name: Verify all jobs passed
        run: |
          if [[ "${{ needs.pre-commit.result }}" != "success" ]]; then
            echo "Pre-commit failed"
            exit 1
          fi
          if [[ "${{ needs.docs.result }}" != "success" ]]; then
            echo "Documentation checks failed"
            exit 1
          fi
          if [[ "${{ needs.flutter.result }}" != "success" ]]; then
            echo "Flutter checks failed"
            exit 1
          fi
          if [[ "${{ needs.django.result }}" != "success" ]]; then
            echo "Django checks failed"
            exit 1
          fi
          echo "All CI jobs passed"
